name: Release

# Driven by release-please. Conventional commits on `main` (`feat:`,
# `fix:`, `BREAKING CHANGE:`) accumulate into a single open "release"
# PR that bumps src/mycoprep/__init__.py + pyproject.toml. Merging that
# PR cuts a new GitHub Release; this workflow then builds the Windows
# PyInstaller bundle and uploads it to the release.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-windows:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Verify tag matches package __version__
        shell: pwsh
        run: |
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          $tagVersion = $tag.TrimStart('v')
          $pkgVersion = (python -c "import mycoprep; print(mycoprep.__version__)").Trim()
          if ($tagVersion -ne $pkgVersion) {
            Write-Error "Tag '$tag' (=> '$tagVersion') does not match mycoprep.__version__ ('$pkgVersion')."
            exit 1
          }
          Write-Host "Tag $tag matches package version $pkgVersion"

      - name: Build PyInstaller bundle
        run: pyinstaller packaging/mycoprep.spec

      - name: Zip bundle
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/MycoPrep/*" -DestinationPath "dist/MycoPrep-windows.zip" -Force

      - name: Upload asset to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/MycoPrep-windows.zip --clobber
